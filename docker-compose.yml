services:
  db:
    image: postgres:latest
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=app_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      
    # --- Local LLM Engine ---
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_storage:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h        # Keep model in VRAM for instant background processing
      - OLLAMA_MAX_LOADED_MODELS=1   # Limits VRAM usage to one model at a time
      - OLLAMA_NUM_PARALLEL=1        # Prevents GPU spikes that cause desktop lag

  fastapi_service:
    build: ./fastapi_app
    ports:
      - "8001:8000"
    volumes:
      - ./fastapi_app:/app
      - ./job_finder:/app/job_finder  # <--- This maps Django project inside FastAPI
      - ./media:/app/media  # Shared volume for PDFs
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

  django:
    build: ./job_finder
    volumes:
      - ./job_finder:/app
      - ./media:/app/media  # Same shared volume
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/app_db
      - FASTAPI_URL=http://fastapi_service:8000
    depends_on:
      db:
        condition: service_healthy
      fastapi_service:
        condition: service_started

volumes:
  postgres_data:
  ollama_storage: